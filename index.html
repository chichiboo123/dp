      padletLabel: '提出リンク', helpTitle: '使い方と安全性', confirm: '確認しました',
      teacherGuide: '先生向けガイド', studentGuide: '生徒向けガイド', securityTitle: '個人情報と安全性',
      teacherSteps: ['上部の[Googleでログイン]でアカウントを連携します。', '[開く]からPDF教材を選択します。', '（任意）[提出リンク]を押して提出先URLを入力します。', '[共有]で生徒にリンクを配布します。'],
      studentSteps: ['先生から受け取ったリンクを開きます。', 'ペン/消しゴムで書き込みます。指2本で拡大・縮小もできます。', '完了したらJPG/PDFで保存します。複数ページの文書は1つのPDFにまとめて保存されます。', '提出先に保存したファイルをアップロードします。'],
      securitySteps: ['専用サーバーに学習データを保存しません。', '個人情報や手書き内容を収集しません。', '生徒は新規アカウント作成なしで利用できます。']
    }
  };

  const GoogleIcon = () => (
    <svg className="w-[18px] h-[18px] shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
  );

  function App() {
    const browserLang = (navigator.language || 'ko').slice(0, 2);
    const [lang, setLang] = useState(i18n[browserLang] ? browserLang : 'ko');
    const t = i18n[lang];
    const languageOptions = [
      { value: 'ko', label: '한국어' },
      { value: 'en', label: 'English' },
      { value: 'ja', label: '日本語' }
    ];

    const [accessToken, setAccessToken] = useState(null);
    const [isApiLoaded, setIsApiLoaded] = useState(false);
    const [isGisLoaded, setIsGisLoaded] = useState(false);
    const [loadError, setLoadError] = useState('');

    const [loadedFileId, setLoadedFileId] = useState('');
    const [padletInput, setPadletInput] = useState('');
    const [activePadlet, setActivePadlet] = useState('');
    const [embedMeta, setEmbedMeta] = useState({ type: '', url: '', fallbackUrl: '' });
    const [embedFailed, setEmbedFailed] = useState(false);
    const [canvaEmbedAttempt, setCanvaEmbedAttempt] = useState(false);
    const [historyTick, setHistoryTick] = useState(0);

    const [pdfDoc, setPdfDoc] = useState(null);
    const [currentPage, setCurrentPage] = useState(1);
    const [totalPages, setTotalPages] = useState(0);

    const [tool, setTool] = useState('pen');
    const [userZoom, setUserZoom] = useState(1);
    const [penColor, setPenColor] = useState('#000000');
    const [penWidth, setPenWidth] = useState(1);
    const [isLoading, setIsLoading] = useState(false);
    const [isToolbarMinimized, setIsToolbarMinimized] = useState(false);
    const [isSharedView, setIsSharedView] = useState(() => new URLSearchParams(window.location.search).has('id'));

    const [showHelpModal, setShowHelpModal] = useState(false);
    const [showSubmitLinkModal, setShowSubmitLinkModal] = useState(false);
    const [showLangMenu, setShowLangMenu] = useState(false);
    const [exportProgress, setExportProgress] = useState({ active: false, current: 0, total: 0 });
    const [authError, setAuthError] = useState('');

    const TOKEN_STORAGE_KEY = 'dp_google_token_v1';

    const pdfCanvasRef = useRef(null);
    const drawCanvasRef = useRef(null);
    const containerRef = useRef(null);
    const langMenuRef = useRef(null);
    const drawingsRef = useRef({});
    const historyRef = useRef({});
    const isDrawing = useRef(false);
    const scaleRef = useRef(1);
    const panState = useRef({ active: false, startX: 0, startY: 0, scrollLeft: 0, scrollTop: 0 });
    const pinchState = useRef({ active: false, initialDist: 0, initialZoom: 1 });

    useEffect(() => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      try {
        const stored = localStorage.getItem(TOKEN_STORAGE_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          if (parsed && parsed.token && parsed.expiresAt && parsed.expiresAt > Date.now() + 60_000) {
            setAccessToken(parsed.token);
          } else {
            localStorage.removeItem(TOKEN_STORAGE_KEY);
          }
        }
      } catch (err) {
        console.warn('[DigitalPaper] token restore error', err);
      }

      const pollLimit = 60;
      let gapiTry = 0;
      let gisTry = 0;

      const pollGapi = () => {
        if (window.gapi && typeof window.gapi.load === 'function') {
          window.gapi.load('picker', {
            callback: () => setIsApiLoaded(true),
            onerror: () => {
              console.error('[DigitalPaper] gapi picker load error');
              setLoadError('구글 API 로딩 실패: 광고차단/네트워크를 확인 후 새로고침하세요.');
            },
            timeout: 10000,
            ontimeout: () => {
              console.error('[DigitalPaper] gapi picker load timeout');
              setLoadError('구글 API 로딩 시간 초과: 광고차단/네트워크를 확인하세요.');
            }
          });
          return;
        }
        gapiTry += 1;
        if (gapiTry >= pollLimit) {
          setLoadError('구글 API 스크립트를 불러오지 못했습니다. 광고차단 또는 네트워크 설정을 확인해주세요.');
          return;
        }
        setTimeout(pollGapi, 100);
      };

      const pollGis = () => {
        if (window.google && window.google.accounts && window.google.accounts.oauth2) {
          setIsGisLoaded(true);
          return;
        }
        gisTry += 1;
        if (gisTry >= pollLimit) {
          setLoadError(prev => prev || '구글 로그인 라이브러리를 불러오지 못했습니다. 광고차단 또는 네트워크를 확인해주세요.');
          return;
        }
        setTimeout(pollGis, 100);
      };

      pollGapi();
      pollGis();

      const qp = new URLSearchParams(window.location.search);
      const urlFileId = qp.get('id');
      const targetPage = parseInt(qp.get('s'), 10);
      const urlPadlet = qp.get('padlet');

      if (urlPadlet) {
        const decodedPadlet = decodeURIComponent(urlPadlet);
        setPadletInput(decodedPadlet);
        setActivePadlet(decodedPadlet);
        setEmbedMeta(getEmbeddedUrl(decodedPadlet));
        setEmbedFailed(false);
        setCanvaEmbedAttempt(false);
      }
      setIsSharedView(Boolean(urlFileId));
      if (urlFileId) {
        loadPdfFromDriveAPI(urlFileId, targetPage || 1, urlPadlet ? decodeURIComponent(urlPadlet) : '')
          .catch(err => console.error('[DigitalPaper] URL PDF load error', err));
      }
    }, []);

    const handleAuth = () => {
      if (!CLIENT_ID || !API_KEY) return alert('관리자가 API 설정을 완료해야 합니다.');
      if (!isGisLoaded) return alert('구글 로그인 라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.');

      try {
        const tokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: (response) => {
            if (response.error) {
              setAuthError(response.error_description || response.error || 'access_denied');
              return;
            }
            if (response.access_token) {
              setAuthError('');
              setAccessToken(response.access_token);
              const lifetimeMs = (parseInt(response.expires_in, 10) || 3600) * 1000;
              try {
                localStorage.setItem(TOKEN_STORAGE_KEY, JSON.stringify({
                  token: response.access_token,
                  expiresAt: Date.now() + lifetimeMs
                }));
              } catch (storeErr) {
                console.warn('[DigitalPaper] token persist error', storeErr);
              }
            }
          }
        });
        tokenClient.requestAccessToken();
      } catch (err) {
        console.error('[DigitalPaper] auth error', err);
        setAuthError('로그인 처리 중 오류가 발생했습니다. 다시 시도해주세요.');
      }
    };

    useEffect(() => {
      if (!showLangMenu) return;
      const onDocClick = (event) => {
        if (langMenuRef.current && !langMenuRef.current.contains(event.target)) {
          setShowLangMenu(false);
        }
      };
      document.addEventListener('mousedown', onDocClick);
      document.addEventListener('touchstart', onDocClick);
      return () => {
        document.removeEventListener('mousedown', onDocClick);
        document.removeEventListener('touchstart', onDocClick);
      };
    }, [showLangMenu]);

    const handleLogout = () => {
      const tokenToRevoke = accessToken;
      setAccessToken(null);
      setLoadedFileId('');
      setPdfDoc(null);
      setTotalPages(0);
      setCurrentPage(1);
      drawingsRef.current = {};
      historyRef.current = {};
      try { localStorage.removeItem(TOKEN_STORAGE_KEY); } catch (_) {}
      if (tokenToRevoke && window.google?.accounts?.oauth2?.revoke) {
        try { window.google.accounts.oauth2.revoke(tokenToRevoke, () => {}); } catch (_) {}
      }
    };

    const openPicker = () => {
      if (!CLIENT_ID || !API_KEY) return alert('API 미설정 상태입니다. 관리자에게 문의하세요.');
      if (!isApiLoaded) return;
      if (!accessToken) return handleAuth();

      try {
        const viewId = window.google.picker.ViewId.PDFS || window.google.picker.ViewId.DOCS;
        const view = new window.google.picker.DocsView(viewId)
          .setMode(window.google.picker.DocsViewMode.LIST)
          .setMimeTypes('application/pdf');

        const pickerBuilder = new window.google.picker.PickerBuilder()
          .enableFeature(window.google.picker.Feature.NAV_HIDDEN)
          .setOAuthToken(accessToken)
          .setOrigin(window.location.protocol + '//' + window.location.host)
          .addView(view)
          .setDeveloperKey(API_KEY)
          .setCallback((data) => {
            if (data.action === window.google.picker.Action.PICKED) {
              const fileId = data.docs[0].id;
              loadPdfFromDriveAPI(fileId, 1, padletInput)
                .catch(err => console.error('[DigitalPaper] picker file load error', err));
            }
          });

        if (APP_ID) pickerBuilder.setAppId(APP_ID);

        pickerBuilder.build().setVisible(true);
      } catch (err) {
        console.error('[DigitalPaper] openPicker error', err);
        setLoadError('파일 선택기를 열지 못했습니다. 페이지를 새로고침해주세요.');
      }
    };

    const loadPdfFromDriveAPI = async (fileId, targetPage = 1, padletUrl = padletInput) => {
      if (!window.pdfjsLib) return;
      setIsLoading(true);
      setPdfDoc(null);
      setUserZoom(1);
      drawingsRef.current = {};
      historyRef.current = {};
      setHistoryTick(prev => prev + 1);
      setActivePadlet(padletUrl);
      setEmbedMeta(getEmbeddedUrl(padletUrl));
      setEmbedFailed(false);
      setCanvaEmbedAttempt(false);

      try {
        const fetchUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;
        const headers = accessToken ? { Authorization: `Bearer ${accessToken}` } : {};
        const response = await fetch(fetchUrl, { headers }).catch(err => {
          console.error('[DigitalPaper] Drive fetch failed', err);
          throw err;
        });

        if (!response.ok) {
          if (response.status === 401) {
            setAccessToken(null);
            try { localStorage.removeItem(TOKEN_STORAGE_KEY); } catch (_) {}
            throw new Error('인증이 만료되었습니다. 다시 로그인 후 시도해주세요.');
          }
          if (response.status === 403 || response.status === 404) {
            throw new Error('파일에 접근할 수 없습니다. "링크가 있는 모든 사용자 보기" 권한을 확인해주세요.');
          }
          throw new Error(`HTTP Error: ${response.status}`);
        }

        const arrayBuffer = await response.arrayBuffer();
        const loadingTask = window.pdfjsLib.getDocument({ data: arrayBuffer });
        const doc = await loadingTask.promise.catch(err => {
          console.error('[DigitalPaper] PDF parse error', err);
          throw err;
        });

        setPdfDoc(doc);
        setTotalPages(doc.numPages);
        setCurrentPage(targetPage);
        setLoadedFileId(fileId);
      } catch (error) {
        console.error('[DigitalPaper] loadPdfFromDriveAPI error', error);
        alert('문서 로드 실패: ' + error.message);
        setLoadedFileId('');
      } finally {
        setIsLoading(false);
      }
    };

    const handleZoom = (delta) => {
      if (drawCanvasRef.current) drawingsRef.current[currentPage] = drawCanvasRef.current.toDataURL();
      setUserZoom(prev => delta === 0 ? 1 : Math.max(0.5, Math.min(4, prev + delta)));
    };

    const changePage = useCallback((delta) => {
      setCurrentPage(prev => {
        const newPage = prev + delta;
        if (newPage < 1 || newPage > totalPages) return prev;
        if (drawCanvasRef.current) drawingsRef.current[prev] = drawCanvasRef.current.toDataURL();
        return newPage;
      });
    }, [totalPages]);

    useEffect(() => {
      if (!pdfDoc) return;
      const renderPage = async () => {
        const page = await pdfDoc.getPage(currentPage).catch(err => {
          console.error('[DigitalPaper] getPage error', err);
          throw err;
        });
        const unscaledViewport = page.getViewport({ scale: 1 });
        let baseScale = 1;

        if (containerRef.current) {
          const containerW = containerRef.current.clientWidth - 32;
          const containerH = containerRef.current.clientHeight * 0.8 - 32;
          const fitW = containerW / unscaledViewport.width;
          const fitH = containerH / unscaledViewport.height;
          baseScale = Math.min(fitW, fitH) * 0.98;
        }

        const finalScale = baseScale * userZoom;
        const viewport = page.getViewport({ scale: finalScale });
        const devicePixelRatio = window.devicePixelRatio || 1;
        scaleRef.current = devicePixelRatio;

        const pdfCanvas = pdfCanvasRef.current;
        const drawCanvas = drawCanvasRef.current;
        if (!pdfCanvas || !drawCanvas) return;

        const ctx = pdfCanvas.getContext('2d');
        const dCtx = drawCanvas.getContext('2d');

        [pdfCanvas, drawCanvas].forEach(canvas => {
          canvas.width = Math.floor(viewport.width * devicePixelRatio);
          canvas.height = Math.floor(viewport.height * devicePixelRatio);
          canvas.style.width = `${Math.floor(viewport.width)}px`;
          canvas.style.height = `${Math.floor(viewport.height)}px`;
        });

        dCtx.setTransform(1, 0, 0, 1, 0, 0);
        dCtx.scale(devicePixelRatio, devicePixelRatio);

        const renderContext = { canvasContext: ctx, transform: [devicePixelRatio, 0, 0, devicePixelRatio, 0, 0], viewport };
        await page.render(renderContext).promise.catch(err => {
          console.error('[DigitalPaper] render error', err);
          throw err;
        });

        dCtx.clearRect(0, 0, viewport.width, viewport.height);
        const savedDataURL = drawingsRef.current[currentPage];
        if (savedDataURL) {
          const img = new Image();
          img.onload = () => dCtx.drawImage(img, 0, 0, viewport.width, viewport.height);
          img.src = savedDataURL;
        }
      };
      renderPage().catch(err => console.error('[DigitalPaper] renderPage chain error', err));
    }, [pdfDoc, currentPage, userZoom]);

    const ensureHistory = (pageNumber) => {
      if (!historyRef.current[pageNumber]) {
        historyRef.current[pageNumber] = { undo: [], redo: [] };
      }
      return historyRef.current[pageNumber];
    };

    const getCanvasSnapshot = () => {
      const canvas = drawCanvasRef.current;
      if (!canvas) return null;
      const data = canvas.toDataURL();
      return data;
    };

    const restoreCanvasSnapshot = (snapshot) => {
      const canvas = drawCanvasRef.current;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const width = canvas.width / scaleRef.current;
      const height = canvas.height / scaleRef.current;
      ctx.clearRect(0, 0, width, height);
      if (!snapshot) {
        delete drawingsRef.current[currentPage];
        return;
      }
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, width, height);
        drawingsRef.current[currentPage] = snapshot;
      };
      img.src = snapshot;
    };

    const pushUndoSnapshot = () => {
      const history = ensureHistory(currentPage);
      history.undo.push(getCanvasSnapshot());
      if (history.undo.length > 60) history.undo.shift();
      history.redo = [];
      setHistoryTick(prev => prev + 1);
    };

    const getPointerPos = (e) => {
      const canvas = drawCanvasRef.current;
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const scaleX = (canvas.width / scaleRef.current) / rect.width;
      const scaleY = (canvas.height / scaleRef.current) / rect.height;
      return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    };

    const startDrawing = (e) => {
      if (tool === 'pan') return;
      pushUndoSnapshot();
      isDrawing.current = true;
      const ctx = drawCanvasRef.current.getContext('2d');
      const pos = getPointerPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.globalCompositeOperation = tool === 'eraser' ? 'destination-out' : 'source-over';
      ctx.strokeStyle = tool === 'eraser' ? 'rgba(0,0,0,1)' : penColor;
      ctx.lineWidth = tool === 'eraser' ? penWidth * 5 : penWidth;
      ctx.lineTo(pos.x, pos.y + 0.1);
      ctx.stroke();
    };

    const draw = (e) => {
      if (!isDrawing.current || tool === 'pan') return;
      const ctx = drawCanvasRef.current.getContext('2d');
      const pos = getPointerPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    };

    const stopDrawing = () => {
      if (!isDrawing.current) return;
      isDrawing.current = false;
      drawCanvasRef.current.getContext('2d').closePath();
      drawingsRef.current[currentPage] = getCanvasSnapshot();
      setHistoryTick(prev => prev + 1);
    };

    const startPan = (clientX, clientY) => {
      if (tool !== 'pan' || !containerRef.current) return;
      panState.current = {
        active: true,
        startX: clientX,
        startY: clientY,
        scrollLeft: containerRef.current.scrollLeft,
        scrollTop: containerRef.current.scrollTop
      };
    };

    const movePan = (clientX, clientY) => {
      if (!panState.current.active || !containerRef.current) return;
      const dx = clientX - panState.current.startX;
      const dy = clientY - panState.current.startY;
      containerRef.current.scrollLeft = panState.current.scrollLeft - dx;
      containerRef.current.scrollTop = panState.current.scrollTop - dy;
    };

    const endPan = () => {
      panState.current.active = false;
    };

    const handleCanvasMouseDown = (e) => {
      if (tool === 'pan') {
        e.preventDefault();
        startPan(e.clientX, e.clientY);
        return;
      }
      startDrawing(e);
    };

    const handleCanvasMouseMove = (e) => {
      if (tool === 'pan') {
        movePan(e.clientX, e.clientY);
        return;
      }
      draw(e);
    };

    const getTouchDistance = (touches) => {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    };

    const handleCanvasTouchStart = (e) => {
      if (!e.touches || !e.touches.length) return;
      if (e.touches.length >= 2) {
        e.preventDefault();
        if (isDrawing.current) {
          isDrawing.current = false;
          drawCanvasRef.current?.getContext('2d').closePath();
        }
        if (drawCanvasRef.current) drawingsRef.current[currentPage] = drawCanvasRef.current.toDataURL();
        pinchState.current = {
          active: true,
          initialDist: getTouchDistance(e.touches),
          initialZoom: userZoom
        };
        return;
      }
      if (tool === 'pan') {
        startPan(e.touches[0].clientX, e.touches[0].clientY);
        return;
      }
      startDrawing(e);
    };

    const handleCanvasTouchMove = (e) => {
      if (!e.touches || !e.touches.length) return;
      if (pinchState.current.active && e.touches.length >= 2) {
        e.preventDefault();
        const newDist = getTouchDistance(e.touches);
        if (!pinchState.current.initialDist) return;
        const ratio = newDist / pinchState.current.initialDist;
        const newZoom = Math.max(0.5, Math.min(4, pinchState.current.initialZoom * ratio));
        setUserZoom(newZoom);
        return;
      }
      if (tool === 'pan') {
        e.preventDefault();
        movePan(e.touches[0].clientX, e.touches[0].clientY);
        return;
      }
      draw(e);
    };

    const handleCanvasTouchEnd = (e) => {
      if (pinchState.current.active) {
        if (!e.touches || e.touches.length < 2) {
          pinchState.current.active = false;
        }
        return;
      }
      if (tool === 'pan') {
        endPan();
        return;
      }
      stopDrawing();
    };

    const handleWheelZoom = (e) => {
      if (!pdfDoc) return;
      if (!(e.ctrlKey || e.metaKey)) return;
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.1 : -0.1;
      handleZoom(delta);
    };

    const handleApplySubmissionLink = () => {
      const trimmed = padletInput.trim();
      if (!trimmed) {
        setActivePadlet('');
        setEmbedMeta({ type: '', url: '', fallbackUrl: '' });
        setEmbedFailed(false);
        setCanvaEmbedAttempt(false);
        return;
      }
      const resolved = getEmbeddedUrl(trimmed);
      setActivePadlet(trimmed);
      setEmbedMeta(resolved);
      setEmbedFailed(false);
      setCanvaEmbedAttempt(false);
    };

    const handleShare = () => {
      if (!loadedFileId) return alert(t.shareError);
      const currentUrl = new URL(window.location.href);
      currentUrl.searchParams.set('id', loadedFileId);
      currentUrl.searchParams.set('s', currentPage.toString());
      if (padletInput.trim()) {
        currentUrl.searchParams.set('padlet', encodeURIComponent(padletInput.trim()));
        setActivePadlet(padletInput.trim());
        setEmbedMeta(getEmbeddedUrl(padletInput.trim()));
        setEmbedFailed(false);
        setCanvaEmbedAttempt(false);
      } else {
        currentUrl.searchParams.delete('padlet');
      }
      navigator.clipboard.writeText(currentUrl.toString())
        .then(() => alert(t.shareSuccess))
        .catch((err) => console.error('[DigitalPaper] share copy error', err));
    };

    const clearCanvas = () => {
      const canvas = drawCanvasRef.current;
      if (!canvas) return;
      pushUndoSnapshot();
      canvas.getContext('2d').clearRect(0, 0, canvas.width / scaleRef.current, canvas.height / scaleRef.current);
      delete drawingsRef.current[currentPage];
    };

    const undoDrawing = () => {
      const history = ensureHistory(currentPage);
      if (!history.undo.length) return;
      history.redo.push(getCanvasSnapshot());
      const previous = history.undo.pop();
      restoreCanvasSnapshot(previous);
      setHistoryTick(prev => prev + 1);
    };

    const redoDrawing = () => {
      const history = ensureHistory(currentPage);
      if (!history.redo.length) return;
      history.undo.push(getCanvasSnapshot());
      const next = history.redo.pop();
      restoreCanvasSnapshot(next);
      setHistoryTick(prev => prev + 1);
    };

    const exportAsJpg = () => {
      const bgCanvas = pdfCanvasRef.current;
      const fgCanvas = drawCanvasRef.current;
      if (!bgCanvas || !fgCanvas) return;
      const exportCanvas = document.createElement('canvas');
      exportCanvas.width = bgCanvas.width;
      exportCanvas.height = bgCanvas.height;
      const ctx = exportCanvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
      ctx.drawImage(bgCanvas, 0, 0);
      ctx.drawImage(fgCanvas, 0, 0);
      const link = document.createElement('a');
      link.download = `digital-paper-page${currentPage}.jpg`;
      link.href = exportCanvas.toDataURL('image/jpeg', 0.9);
      link.click();
    };

    const drawAnnotationOnto = (ctx, snapshot, width, height) => new Promise((resolve) => {
      if (!snapshot) { resolve(); return; }
      const img = new Image();
      img.onload = () => { ctx.drawImage(img, 0, 0, width, height); resolve(); };
      img.onerror = () => resolve();
      img.src = snapshot;
    });

    const exportAsPdf = async () => {
      if (!pdfDoc || !window.jspdf || !window.jspdf.jsPDF) return;

      if (drawCanvasRef.current) {
        drawingsRef.current[currentPage] = drawCanvasRef.current.toDataURL();
      }

      setIsLoading(true);
      setExportProgress({ active: true, current: 0, total: totalPages });

      try {
        const exportScale = 2;
        let pdf = null;

        for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
          setExportProgress({ active: true, current: pageNum, total: totalPages });

          const page = await pdfDoc.getPage(pageNum);
          const viewport = page.getViewport({ scale: exportScale });
          const pageCanvas = document.createElement('canvas');
          pageCanvas.width = Math.floor(viewport.width);
          pageCanvas.height = Math.floor(viewport.height);
          const pageCtx = pageCanvas.getContext('2d');
          pageCtx.fillStyle = '#ffffff';
          pageCtx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);

          await page.render({ canvasContext: pageCtx, viewport }).promise;

          await drawAnnotationOnto(pageCtx, drawingsRef.current[pageNum], pageCanvas.width, pageCanvas.height);

          const orientation = pageCanvas.width > pageCanvas.height ? 'landscape' : 'portrait';
          const imgData = pageCanvas.toDataURL('image/jpeg', 0.9);

          if (!pdf) {
            pdf = new window.jspdf.jsPDF({ orientation, unit: 'px', format: [pageCanvas.width, pageCanvas.height] });
          } else {
            pdf.addPage([pageCanvas.width, pageCanvas.height], orientation);
          }
          pdf.addImage(imgData, 'JPEG', 0, 0, pageCanvas.width, pageCanvas.height);
        }

        const filename = totalPages > 1 ? 'digital-paper.pdf' : `digital-paper-page${currentPage}.pdf`;
        pdf.save(filename);
      } catch (err) {
        console.error('[DigitalPaper] PDF export error', err);
        alert('PDF 저장 실패: ' + (err && err.message ? err.message : err));
      } finally {
        setExportProgress({ active: false, current: 0, total: 0 });
        setIsLoading(false);
      }
    };


    const getEmbeddedUrl = (rawUrl) => {
      if (!rawUrl) return { type: '', url: '', fallbackUrl: '' };
      let normalized = rawUrl.trim();
      if (!/^https?:\/\//i.test(normalized)) normalized = `https://${normalized}`;

      try {
        const url = new URL(normalized);
        const host = url.hostname.replace(/^www\./, '');

        if (host.includes('canva.com') || host.includes('canva.link')) {
          let embedUrl = url.toString();

          if (host.includes('canva.com') && url.pathname.includes('/design/')) {
            embedUrl = url.toString().replace('/edit', '/view');
            const embedParsed = new URL(embedUrl);
            embedParsed.searchParams.set('embed', '1');
            embedUrl = embedParsed.toString();
          }

          return { type: 'canva', url: embedUrl, fallbackUrl: url.toString() };
        }

        if (host.includes('padlet.com') || host.includes('thinkerbell.co.kr') || host.includes('thinkerbell.com')) {
          return { type: 'iframe', url: url.toString(), fallbackUrl: url.toString() };
        }

        return { type: 'iframe', url: url.toString(), fallbackUrl: url.toString() };
      } catch (error) {
        return { type: 'invalid', url: normalized, fallbackUrl: normalized };
      }
    };

    const pageHistory = historyRef.current[currentPage] || { undo: [], redo: [] };
    const canUndo = pageHistory.undo.length > 0;
    const canRedo = pageHistory.redo.length > 0;

    return (
      <div className="flex flex-col h-[100dvh] overflow-hidden bg-warm text-gray-700">
        <header className="bg-white/90 backdrop-blur-md border-b border-pink-100 px-3 sm:px-6 py-2 flex flex-col gap-1 shadow-[0_4px_20px_-6px_rgba(99,102,241,0.15)] z-20 shrink-0">
          <div className="flex items-center gap-1.5 sm:gap-2 min-w-0">
            <span className="material-icons text-pastelBlueText text-xl sm:text-2xl shrink-0">edit_document</span>
            <h1 className="text-[14px] sm:text-[18px] leading-tight font-bold tracking-[-0.02em] text-gray-900 mr-auto shrink-0">{t.title}</h1>
            {!isSharedView && (!accessToken ? (
              <button onClick={handleAuth} disabled={!isGisLoaded} className="h-9 w-9 sm:h-10 sm:w-auto sm:px-3 rounded-xl bg-[#1D4ED8] hover:bg-[#1E40AF] text-white border border-[#1E40AF] disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-1.5 shrink-0 transition-all hover:-translate-y-0.5 hover:shadow-md">
                <GoogleIcon />
                <span className="hidden sm:inline text-sm font-semibold whitespace-nowrap">{t.login}</span>
              </button>
            ) : (
              <button onClick={openPicker} disabled={!isApiLoaded} className="h-9 w-9 sm:h-10 sm:w-auto sm:px-3 rounded-xl bg-[#047857] hover:bg-[#065F46] text-white border border-[#065F46] disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-1.5 shrink-0 transition-all hover:-translate-y-0.5 hover:shadow-md">
                <span className="material-icons text-base">folder_open</span>
                <span className="hidden sm:inline text-sm font-semibold whitespace-nowrap">{t.select}</span>
              </button>
            ))}
            {!isSharedView && (
              <button onClick={handleShare} className="h-9 w-9 sm:h-10 sm:w-auto sm:px-3 rounded-xl bg-[#374151] hover:bg-[#1F2937] text-white border border-[#111827] flex items-center justify-center gap-1.5 shrink-0 transition-all hover:-translate-y-0.5 hover:shadow-md">
                <span className="material-icons text-base">ios_share</span>
                <span className="hidden sm:inline text-sm font-semibold whitespace-nowrap">{t.share}</span>
              </button>
            )}
            {!isSharedView && (
              <button onClick={() => setShowSubmitLinkModal(true)} title={t.submitLink} className={`h-9 w-9 sm:h-10 sm:w-auto sm:px-3 rounded-xl flex items-center justify-center gap-1.5 shrink-0 transition-all hover:-translate-y-0.5 hover:shadow-md border ${activePadlet ? 'bg-[#DBEAFE] border-[#93C5FD] text-[#1E40AF]' : 'bg-white border-slate-300 text-slate-700 hover:bg-slate-50'}`}>
                <span className="material-icons text-base">link</span>
                <span className="hidden sm:inline text-sm font-semibold whitespace-nowrap">{t.submitLink}</span>
              </button>
            )}
            <div ref={langMenuRef} className="relative shrink-0">
              <button onClick={() => setShowLangMenu(prev => !prev)} title={t.language} className="h-9 w-9 sm:h-10 sm:w-10 rounded-xl border border-slate-300 bg-white hover:bg-slate-50 text-slate-700 flex items-center justify-center transition-all hover:-translate-y-0.5 hover:shadow-md">
                <span className="material-icons text-base">language</span>
              </button>
              {showLangMenu && (
                <div className="absolute right-0 top-full mt-1 min-w-[140px] rounded-xl border border-slate-200 bg-white shadow-lg overflow-hidden z-30">
                  {languageOptions.map((option) => (
                    <button
                      key={option.value}
                      onClick={() => { setLang(option.value); setShowLangMenu(false); }}
                      className={`w-full px-3 py-2 text-left text-sm transition-colors ${lang === option.value ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-slate-700 hover:bg-slate-50'}`}
                    >
                      {option.label}
                    </button>
                  ))}
                </div>
              )}
            </div>
            <button onClick={() => setShowHelpModal(true)} className="h-9 w-9 sm:h-10 sm:w-auto sm:px-3 rounded-xl bg-white hover:bg-gray-50 text-[#1E40AF] border border-[#93C5FD] flex items-center justify-center gap-1.5 shrink-0 transition-all hover:-translate-y-0.5 hover:shadow-md">
              <span className="material-icons text-base">lightbulb</span>
              <span className="hidden sm:inline text-sm font-semibold whitespace-nowrap">{t.guide}</span>
            </button>
            {!isSharedView && accessToken && (
              <button onClick={handleLogout} title={t.logout} className="h-9 w-9 sm:h-10 sm:w-auto sm:px-3 rounded-xl bg-white hover:bg-red-50 text-red-700 border border-red-200 flex items-center justify-center gap-1.5 shrink-0 transition-all hover:-translate-y-0.5 hover:shadow-md">
                <span className="material-icons text-base">logout</span>
                <span className="hidden sm:inline text-sm font-semibold whitespace-nowrap">{t.logout}</span>
              </button>
            )}
          </div>
          {!isApiLoaded && <p className="text-xs font-medium text-gray-500 px-1">{t.googleLoading}</p>}
          {loadError && <div className="rounded-xl border border-red-300 bg-red-50 px-3 py-1.5 text-xs font-medium text-red-700">{loadError}</div>}
        </header>

        <main className="flex-1 flex flex-col bg-[#f7f5ff] relative overflow-hidden">
          {authError && (
            <div className="mx-4 mt-3 rounded-xl border border-red-300 bg-red-50 px-4 py-3 text-sm text-red-800">
              <p className="font-semibold mb-1">구글 로그인 설정 오류</p>
              <p>현재 오류: {authError}</p>
            </div>
          )}

          {isLoading && (
            <div className="absolute inset-0 bg-white/70 flex flex-col items-center justify-center z-50 gap-3">
              <div className="animate-spin rounded-full h-12 w-12 border-4 border-pastelBlue border-t-pastelPink"></div>
              {exportProgress.active && (
                <p className="text-sm font-semibold text-gray-700">{t.exporting} ({exportProgress.current}/{exportProgress.total})</p>
              )}
            </div>
          )}

          <div data-history={historyTick} className="flex-1 overflow-auto p-4 sm:p-6 pb-40 flex flex-col items-center bg-gradient-to-b from-[#f8f7ff] to-[#eef2ff]" ref={containerRef} onWheel={handleWheelZoom}>
            {!pdfDoc && !isLoading && (
              <div className="text-center text-gray-500 mt-20">
                <div className="mx-auto mb-4 w-24 h-24 rounded-full bg-gradient-to-br from-pastelBlue to-pastelPink flex items-center justify-center"><span className="material-icons text-6xl text-white">auto_stories</span></div>
                <p className="text-lg font-semibold mb-2 text-gray-700">{t.emptyTitle}</p>
                <p className="text-sm font-medium">{t.emptyDesc}</p>
              </div>
            )}

            {pdfDoc && totalPages > 1 && (
              <div className="mb-4 bg-white border border-pink-200 px-4 py-1.5 rounded-full shadow-md flex items-center gap-3">
                <button onClick={() => changePage(-1)} disabled={currentPage <= 1} className="text-gray-600 disabled:text-gray-300 hover:text-pastelBlueText p-1"><span className="material-icons">chevron_left</span></button>
                <span className="text-sm font-semibold text-gray-700 min-w-[80px] text-center">{t.page} {currentPage} / {totalPages}</span>
                <button onClick={() => changePage(1)} disabled={currentPage >= totalPages} className="text-gray-600 disabled:text-gray-300 hover:text-pastelBlueText p-1"><span className="material-icons">chevron_right</span></button>
              </div>
            )}

            {pdfDoc && (
              <div className="relative flex-shrink-0 mb-8">
                <div className="relative shadow-[0_10px_30px_-8px_rgba(99,102,241,0.25)] border border-pink-100 bg-white rounded-2xl overflow-hidden" style={{ touchAction: 'none' }}>
                  <canvas ref={pdfCanvasRef} className="block" />
                  <canvas
                    ref={drawCanvasRef}
                    className={`absolute top-0 left-0 ${tool === 'pan' ? 'cursor-grab active:cursor-grabbing' : 'cursor-crosshair'}`}
                    onMouseDown={handleCanvasMouseDown} onMouseMove={handleCanvasMouseMove} onMouseUp={tool === 'pan' ? endPan : stopDrawing} onMouseLeave={tool === 'pan' ? endPan : stopDrawing}
                    onTouchStart={handleCanvasTouchStart} onTouchMove={handleCanvasTouchMove} onTouchEnd={handleCanvasTouchEnd} onTouchCancel={handleCanvasTouchEnd}
                  />
                </div>
              </div>
            )}

            {activePadlet && pdfDoc && (
              <div className="w-full max-w-4xl mt-12 mb-8 flex flex-col items-center">
                <div className="bg-gradient-to-r from-pastelPink to-pastelYellow text-pastelPinkText font-bold px-6 py-3 rounded-t-xl border border-pink-200 shadow-sm flex items-center gap-2">
                  <span className="material-icons">upload_file</span>{t.submitGuide}
                </div>
                {((embedMeta.type === 'canva' && !canvaEmbedAttempt) || (embedMeta.type === 'canva' && embedFailed) || embedMeta.type === 'invalid') ? (
                  <div className="w-full border-2 border-pink-200 shadow-lg rounded-b-xl rounded-t-none bg-white p-8 text-center">
                    <p className="text-sm text-gray-700 font-semibold mb-3">{t.canvaBlocked}</p>
                    {embedMeta.type === 'canva' && !embedFailed && (
                      <button onClick={() => setCanvaEmbedAttempt(true)} className="mr-2 inline-flex items-center gap-1 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700">
                        <span className="material-icons text-base">slideshow</span>{t.tryEmbed}
                      </button>
                    )}
                    <a href={embedMeta.fallbackUrl || embedMeta.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 rounded-lg border border-blue-300 bg-blue-50 px-4 py-2 text-sm font-semibold text-blue-700">
                      <span className="material-icons text-base">open_in_new</span>{t.openLink}
                    </a>
                  </div>
                ) : (
                  <iframe src={embedMeta.url || activePadlet} onError={() => setEmbedFailed(true)} className="w-full h-[600px] border-2 border-pink-200 shadow-lg rounded-b-xl rounded-t-none bg-white" allow="camera;microphone;geolocation" title="Submission Area"/>
                )}
              </div>
            )}
          </div>

          {pdfDoc && (
            <>
              <div className="fixed left-1/2 -translate-x-1/2 bottom-3 sm:bottom-6 z-40 w-[calc(100%-2rem)] sm:w-auto">
                <div className="rounded-2xl border border-slate-200 bg-white/95 backdrop-blur-md shadow-lg px-2 py-2 flex items-center justify-center gap-1 sm:gap-1.5">
                  <button onClick={() => setIsToolbarMinimized(prev => !prev)} className="h-11 w-11 rounded-xl border border-slate-200 text-slate-600 bg-white hover:bg-slate-50 flex items-center justify-center shrink-0" title="Toggle toolbar">
                    <span className="material-icons text-base">{isToolbarMinimized ? 'expand_more' : 'expand_less'}</span>
                  </button>

                  {!isToolbarMinimized && (
                    <>
                      <div className="w-px h-6 bg-slate-200 shrink-0"/>
                      <button title={t.pen} onClick={() => setTool('pen')} className={`h-11 w-11 rounded-xl border flex items-center justify-center shrink-0 ${tool === 'pen' ? 'bg-blue-100 text-blue-800 border-blue-300' : 'bg-white text-gray-600 border-gray-200'}`}><span className="material-icons text-[20px]">draw</span></button>
                      <button title={t.eraser} onClick={() => setTool('eraser')} className={`h-11 w-11 rounded-xl border flex items-center justify-center shrink-0 ${tool === 'eraser' ? 'bg-pink-100 text-pink-800 border-pink-300' : 'bg-white text-gray-600 border-gray-200'}`}><span className="material-icons text-[20px]">cleaning_services</span></button>
                      <button title={t.pan} onClick={() => setTool('pan')} className={`h-11 w-11 rounded-xl border flex items-center justify-center shrink-0 ${tool === 'pan' ? 'bg-amber-100 text-amber-800 border-amber-300' : 'bg-white text-gray-600 border-gray-200'}`}><span className="material-icons text-[20px]">back_hand</span></button>
                      <div className="hidden md:flex items-center gap-2 px-2 border-l border-slate-200">
                        <input type="color" value={penColor} onChange={(e) => setPenColor(e.target.value)} disabled={tool !== 'pen'} className="w-8 h-8 rounded-md cursor-pointer border-0 p-0"/>
                        <input type="range" min="1" max="20" value={penWidth} onChange={(e) => setPenWidth(parseInt(e.target.value, 10))} className="w-24 accent-blue-500"/>
                      </div>
                      <div className="w-px h-6 bg-slate-200 shrink-0"/>
                      <button onClick={undoDrawing} disabled={!canUndo} className="h-11 w-11 rounded-xl border border-gray-200 bg-white text-gray-700 disabled:opacity-35 flex items-center justify-center shrink-0" title={t.undo}><span className="material-icons text-[20px]">undo</span></button>
                      <button onClick={redoDrawing} disabled={!canRedo} className="h-11 w-11 rounded-xl border border-gray-200 bg-white text-gray-700 disabled:opacity-35 flex items-center justify-center shrink-0" title={t.redo}><span className="material-icons text-[20px]">redo</span></button>
                      <button onClick={clearCanvas} className="h-11 w-11 rounded-xl border border-gray-200 bg-white text-gray-500 flex items-center justify-center shrink-0" title={t.clear}><span className="material-icons text-[20px]">restart_alt</span></button>
                      <div className="w-px h-6 bg-slate-200 shrink-0"/>
                      <button onClick={exportAsJpg} className="h-11 px-2.5 rounded-xl border border-[#FDBA74] bg-[#FFF7ED] text-[#9A3412] font-semibold flex items-center gap-1 shrink-0">
                        <span className="material-icons text-[18px]">image</span>
                        <span className="text-xs">JPG</span>
                      </button>
                      <button onClick={exportAsPdf} className="h-11 px-2.5 rounded-xl border border-[#86EFAC] bg-[#ECFDF5] text-[#166534] font-semibold flex items-center gap-1 shrink-0">
                        <span className="material-icons text-[18px]">picture_as_pdf</span>
                        <span className="text-xs">PDF</span>
                      </button>
                    </>
                  )}
                </div>
              </div>

              <div className="fixed right-3 bottom-[72px] sm:bottom-8 z-40">
                <div className="rounded-2xl border border-slate-200 bg-white/95 backdrop-blur-md shadow-xl px-2 py-2 flex flex-col items-center gap-2">
                  <button onClick={() => handleZoom(0.1)} className="h-11 w-11 rounded-xl border border-gray-200 text-xl font-bold text-gray-700 hover:bg-gray-50 flex items-center justify-center">+</button>
                  <button onClick={() => handleZoom(-0.1)} className="h-11 w-11 rounded-xl border border-gray-200 text-xl font-bold text-gray-700 hover:bg-gray-50 flex items-center justify-center">-</button>
                  <button onClick={() => handleZoom(0)} className="h-9 min-w-[44px] px-2 rounded-xl border border-indigo-200 text-xs font-bold text-indigo-700 bg-indigo-50">{t.fit}</button>
                </div>
              </div>

            </>
          )}
        </main>

        <footer className="bg-white/90 border-t border-pink-100 py-2 text-center shrink-0 z-10">
          <a href="https://litt.ly/chichiboo" target="_blank" rel="noopener noreferrer" className="text-gray-500 hover:text-pastelBlueText text-xs font-medium transition-colors inline-block">Created by. 교육뮤지컬 꿈꾸는 치수쌤</a>
        </footer>

        {showHelpModal && (
          <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
            <div className="bg-white rounded-3xl shadow-2xl max-w-2xl w-full max-h-[90vh] flex flex-col relative overflow-hidden">
              <div className="bg-gradient-to-r from-blue-100 to-pink-100 border-b border-blue-100 px-6 py-4 flex items-center justify-between shrink-0">
                <h2 className="text-[18px] font-bold text-gray-800 flex items-center gap-2"><span className="material-icons">lightbulb</span>{t.helpTitle}</h2>
                <button onClick={() => setShowHelpModal(false)} className="text-gray-400 hover:text-gray-700 transition-colors p-1"><span className="material-icons">close</span></button>
              </div>

              <div className="p-6 overflow-y-auto space-y-8 flex-1 text-[15px]">
                <section>
                  <h3 className="text-[18px] font-bold text-pastelBlueText bg-blue-100/50 px-3 py-1.5 rounded-md inline-flex items-center gap-2 mb-3"><span className="material-icons">school</span>{t.teacherGuide}</h3>
                  <ol className="list-decimal list-inside space-y-2 text-gray-700 ml-1">
                    {t.teacherSteps.map((step, idx) => <li key={`teacher-${idx}`}>{step}</li>)}
                  </ol>
                </section>

                <section>
                  <h3 className="text-[18px] font-bold text-pastelGreenText bg-green-100/50 px-3 py-1.5 rounded-md inline-flex items-center gap-2 mb-3"><span className="material-icons">face</span>{t.studentGuide}</h3>
                  <ol className="list-decimal list-inside space-y-2 text-gray-700 ml-1">
                    {t.studentSteps.map((step, idx) => <li key={`student-${idx}`}>{step}</li>)}
                  </ol>
                </section>

                <section className="bg-gray-50 p-5 rounded-xl border border-gray-200">
                  <h3 className="text-[18px] font-bold text-gray-800 flex items-center gap-2 mb-3"><span className="material-icons text-purple-600">shield</span>{t.securityTitle}</h3>
                  <ul className="space-y-3 text-[14px] text-gray-700">
                    {t.securitySteps.map((step, idx) => <li key={`security-${idx}`}>{step}</li>)}
                  </ul>
                </section>
              </div>

              <div className="bg-gray-50 border-t border-gray-100 px-6 py-4 flex justify-end shrink-0">
                <button onClick={() => setShowHelpModal(false)} className="min-h-[44px] rounded-xl px-6 py-2 bg-pastelBlue hover:bg-pastelBlueHover text-pastelBlueText font-bold transition-all hover:-translate-y-0.5 hover:shadow-md">{t.confirm}</button>
              </div>
            </div>
          </div>
        )}

        {showSubmitLinkModal && (
          <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setShowSubmitLinkModal(false)}>
            <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden" onClick={(e) => e.stopPropagation()}>
              <div className="bg-gradient-to-r from-blue-100 to-pink-100 border-b border-blue-100 px-6 py-4 flex items-center justify-between">
                <h2 className="text-[18px] font-bold text-gray-800 flex items-center gap-2"><span className="material-icons">link</span>{t.submitLinkTitle}</h2>
                <button onClick={() => setShowSubmitLinkModal(false)} className="text-gray-400 hover:text-gray-700 transition-colors p-1"><span className="material-icons">close</span></button>
              </div>
              <div className="p-6 space-y-4">
                <p className="text-sm text-gray-600 leading-relaxed">{t.submitLinkDesc}</p>
                <input
                  type="text"
                  value={padletInput}
                  onChange={(e) => setPadletInput(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') { handleApplySubmissionLink(); setShowSubmitLinkModal(false); } }}
                  placeholder={t.padletPlaceholder}
                  className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm text-gray-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-200"
                  autoFocus
                />
              </div>
              <div className="bg-gray-50 border-t border-gray-100 px-6 py-4 flex flex-wrap justify-end gap-2">
                {padletInput && (
                  <button
                    onClick={() => { setPadletInput(''); setActivePadlet(''); setEmbedMeta({ type: '', url: '', fallbackUrl: '' }); setEmbedFailed(false); setCanvaEmbedAttempt(false); setShowSubmitLinkModal(false); }}
                    className="min-h-[40px] rounded-xl px-4 py-2 bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 text-sm font-semibold transition-colors"
                  >
                    {t.remove}
                  </button>
                )}
                <button onClick={() => setShowSubmitLinkModal(false)} className="min-h-[40px] rounded-xl px-4 py-2 bg-white border border-slate-300 text-slate-600 hover:bg-slate-50 text-sm font-semibold transition-colors">{t.cancel}</button>
                <button onClick={() => { handleApplySubmissionLink(); setShowSubmitLinkModal(false); }} className="min-h-[40px] rounded-xl px-5 py-2 bg-[#1D4ED8] hover:bg-[#1E40AF] text-white text-sm font-bold transition-colors">{t.save}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
